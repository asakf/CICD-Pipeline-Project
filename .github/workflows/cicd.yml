name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test
      # Use working-directory so Maven finds pom.xml naturally
      run: mvn -B clean package
      working-directory: liapp 

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package-out
        path: liapp/target/*.jar
